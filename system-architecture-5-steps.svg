<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Jan-Aushadhi Finder System Architecture in 5 Steps</title>
  <desc id="desc">A five-step system architecture diagram for the Jan-Aushadhi Finder Android app.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.52" stop-color="#eef7f1"/>
      <stop offset="1" stop-color="#f7f4ec"/>
    </linearGradient>
    <linearGradient id="stepGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f9d72"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="stepBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3675d6"/>
      <stop offset="1" stop-color="#315a9f"/>
    </linearGradient>
    <linearGradient id="stepGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d69b28"/>
      <stop offset="1" stop-color="#a65f16"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#1f2937" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 800 54px Arial, Helvetica, sans-serif; fill: #10201a; }
      .subtitle { font: 400 24px Arial, Helvetica, sans-serif; fill: #45594f; }
      .stepNo { font: 800 30px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .stepTitle { font: 800 26px Arial, Helvetica, sans-serif; fill: #10201a; }
      .body { font: 400 21px Arial, Helvetica, sans-serif; fill: #334155; }
      .small { font: 700 17px Arial, Helvetica, sans-serif; fill: #475569; }
      .chip { font: 700 18px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .card { fill: #ffffff; stroke: #d8e1dc; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .mini { fill: #f8fafc; stroke: #d8e1dc; stroke-width: 1.5; rx: 12; }
      .line { stroke: #334155; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect x="54" y="54" width="1492" height="892" rx="34" fill="#ffffff" opacity="0.72" stroke="#d7e2dc"/>

  <text x="100" y="130" class="title">Jan-Aushadhi Finder System Architecture</text>
  <text x="102" y="172" class="subtitle">Five-step flow from user action to offline medicine search, savings, maps, and refill reminders</text>

  <g transform="translate(100 250)">
    <rect class="card" x="0" y="0" width="240" height="510"/>
    <circle cx="46" cy="48" r="30" fill="url(#stepGreen)"/>
    <text x="37" y="58" class="stepNo">1</text>
    <text x="88" y="44" class="stepTitle">User Interface</text>
    <text x="88" y="76" class="small">XML + ViewBinding</text>
    <rect class="mini" x="28" y="122" width="184" height="58"/>
    <text x="52" y="158" class="chip">Home</text>
    <rect class="mini" x="28" y="196" width="184" height="58"/>
    <text x="52" y="232" class="chip">Search</text>
    <rect class="mini" x="28" y="270" width="184" height="58"/>
    <text x="52" y="306" class="chip">Stores Map</text>
    <rect class="mini" x="28" y="344" width="184" height="58"/>
    <text x="52" y="380" class="chip">Reminders</text>
    <text x="28" y="456" class="body">Bottom navigation</text>
    <text x="28" y="486" class="body">drives app screens</text>
  </g>

  <path class="line" d="M 358 505 C 392 505, 398 505, 432 505"/>

  <g transform="translate(440 250)">
    <rect class="card" x="0" y="0" width="240" height="510"/>
    <circle cx="46" cy="48" r="30" fill="url(#stepBlue)"/>
    <text x="37" y="58" class="stepNo">2</text>
    <text x="88" y="44" class="stepTitle">ViewModels</text>
    <text x="88" y="76" class="small">MVVM state layer</text>
    <rect class="mini" x="28" y="122" width="184" height="58"/>
    <text x="52" y="158" class="chip">HomeViewModel</text>
    <rect class="mini" x="28" y="196" width="184" height="58"/>
    <text x="52" y="232" class="chip">SearchViewModel</text>
    <rect class="mini" x="28" y="270" width="184" height="58"/>
    <text x="52" y="306" class="chip">ReminderViewModel</text>
    <text x="28" y="374" class="body">Coordinates UI</text>
    <text x="28" y="404" class="body">events, selected</text>
    <text x="28" y="434" class="body">medicines, and</text>
    <text x="28" y="464" class="body">screen state.</text>
  </g>

  <path class="line" d="M 698 505 C 732 505, 738 505, 772 505"/>

  <g transform="translate(780 250)">
    <rect class="card" x="0" y="0" width="240" height="510"/>
    <circle cx="46" cy="48" r="30" fill="url(#stepGreen)"/>
    <text x="37" y="58" class="stepNo">3</text>
    <text x="88" y="44" class="stepTitle">Repository</text>
    <text x="88" y="76" class="small">Business logic</text>
    <rect class="mini" x="28" y="122" width="184" height="70"/>
    <text x="48" y="152" class="chip">Medicine</text>
    <text x="48" y="176" class="chip">Repository</text>
    <text x="28" y="248" class="body">Searches brand</text>
    <text x="28" y="278" class="body">names, generic</text>
    <text x="28" y="308" class="body">salts, pricing,</text>
    <text x="28" y="338" class="body">suggestions, and</text>
    <text x="28" y="368" class="body">savings data.</text>
  </g>

  <path class="line" d="M 1038 505 C 1072 505, 1078 505, 1112 505"/>

  <g transform="translate(1120 250)">
    <rect class="card" x="0" y="0" width="240" height="510"/>
    <circle cx="46" cy="48" r="30" fill="url(#stepGold)"/>
    <text x="37" y="58" class="stepNo">4</text>
    <text x="88" y="44" class="stepTitle">Local Data</text>
    <text x="88" y="76" class="small">Offline-first Room DB</text>
    <rect class="mini" x="28" y="122" width="184" height="58"/>
    <text x="52" y="158" class="chip">MedicineDao</text>
    <rect class="mini" x="28" y="196" width="184" height="58"/>
    <text x="52" y="232" class="chip">ReminderDao</text>
    <rect class="mini" x="28" y="270" width="184" height="58"/>
    <text x="52" y="306" class="chip">SeedData</text>
    <text x="28" y="374" class="body">Room stores 550</text>
    <text x="28" y="404" class="body">medicine records</text>
    <text x="28" y="434" class="body">and refill plans.</text>
  </g>

  <path class="line" d="M 1360 505 C 1392 505, 1398 505, 1430 505"/>

  <g transform="translate(100 810)">
    <rect x="0" y="0" width="1400" height="76" rx="18" fill="#10201a"/>
    <text x="38" y="48" style="font: 700 24px Arial, Helvetica, sans-serif; fill: #ffffff;">Step 5: Device & External Services</text>
    <text x="440" y="48" style="font: 400 23px Arial, Helvetica, sans-serif; fill: #dff5ea;">Google Maps SDK renders nearby simulated Jan Aushadhi Kendra markers; AlarmManager schedules monthly refill notifications through ReminderReceiver.</text>
  </g>

  <g transform="translate(1418 272)">
    <rect x="0" y="0" width="92" height="466" rx="20" fill="#f8fafc" stroke="#d8e1dc" stroke-width="2" filter="url(#shadow)"/>
    <circle cx="46" cy="56" r="29" fill="url(#stepGold)"/>
    <text x="37" y="66" class="stepNo">5</text>
    <rect x="23" y="126" width="46" height="46" rx="8" fill="#dbeafe" stroke="#93c5fd"/>
    <path d="M46 136 C34 151, 34 162, 46 170 C58 162, 58 151, 46 136 Z" fill="#2563eb"/>
    <circle cx="46" cy="154" r="5" fill="#ffffff"/>
    <rect x="23" y="236" width="46" height="46" rx="8" fill="#fef3c7" stroke="#f5c454"/>
    <path d="M46 247 L56 261 H49 L49 273 H43 L43 261 H36 Z" fill="#a65f16"/>
    <rect x="23" y="346" width="46" height="46" rx="8" fill="#dcfce7" stroke="#86efac"/>
    <path d="M34 369 H58 M46 355 V383" stroke="#0f766e" stroke-width="7" stroke-linecap="round"/>
  </g>

  <text x="100" y="930" style="font: 400 18px Arial, Helvetica, sans-serif; fill: #64748b;">Stack: Kotlin, AndroidX, Material Design 3, RecyclerView, Room, Google Maps SDK, AlarmManager</text>
</svg>
